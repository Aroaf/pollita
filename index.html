<!-- ===================================================== -->
<!-- BOTONES GLOBALES: Limpiar todos los grupos y Cargar todos los oficiales -->
<!-- ===================================================== -->
<script>
(function() {
    // Esperar a que el DOM esté listo
    function agregarBotonesGlobales() {
        // Buscar el contenedor de tabs (donde están los botones de grupos)
        const tabsContainer = document.getElementById('tabsGrupos');
        if (!tabsContainer) return;
        
        // Verificar si los botones ya existen para no duplicar
        if (document.getElementById('botonesGlobalesContainer')) return;
        
        // Crear el contenedor de botones globales
        const divBotones = document.createElement('div');
        divBotones.id = 'botonesGlobalesContainer';
        divBotones.className = 'botones-globales';
        divBotones.style.marginTop = '16px';
        divBotones.style.display = 'flex';
        divBotones.style.gap = '12px';
        divBotones.style.justifyContent = 'flex-end';
        divBotones.style.flexWrap = 'wrap';
        divBotones.style.borderTop = '1px solid var(--linea, #e2e8f0)';
        divBotones.style.paddingTop = '16px';
        
        // Botón Limpiar todos los grupos
        const btnLimpiarTodos = document.createElement('button');
        btnLimpiarTodos.type = 'button';
        btnLimpiarTodos.className = 'btn-peligro';
        btnLimpiarTodos.textContent = '🧹 Limpiar todos los grupos';
        btnLimpiarTodos.style.border = 'none';
        btnLimpiarTodos.style.background = 'linear-gradient(135deg, #b91c1c, #991b1b)';
        btnLimpiarTodos.style.color = '#ffffff';
        btnLimpiarTodos.style.borderRadius = '10px';
        btnLimpiarTodos.style.padding = '8px 12px';
        btnLimpiarTodos.style.fontWeight = '700';
        btnLimpiarTodos.style.cursor = 'pointer';
        
        // Botón Cargar resultados oficiales (todos los grupos)
        const btnCargarTodos = document.createElement('button');
        btnCargarTodos.type = 'button';
        btnCargarTodos.className = 'btn-pri';
        btnCargarTodos.textContent = '📡 Cargar resultados oficiales (todos los grupos)';
        btnCargarTodos.style.border = 'none';
        btnCargarTodos.style.background = 'linear-gradient(135deg, #0f7a46, #0c663a)';
        btnCargarTodos.style.color = '#ffffff';
        btnCargarTodos.style.borderRadius = '10px';
        btnCargarTodos.style.padding = '8px 12px';
        btnCargarTodos.style.fontWeight = '700';
        btnCargarTodos.style.cursor = 'pointer';
        
        divBotones.appendChild(btnLimpiarTodos);
        divBotones.appendChild(btnCargarTodos);
        
        // Insertar después del panel de grupo (dentro del mismo bloque .bloque)
        const bloqueResultados = document.querySelector('.bloque');
        if (bloqueResultados) {
            bloqueResultados.appendChild(divBotones);
        }
        
        // --- Función para limpiar todos los grupos ---
        btnLimpiarTodos.addEventListener('click', function() {
            if (confirm('⚠️ ¿Estás seguro? Se borrarán TODOS los resultados guardados de todos los grupos. Esta acción no se puede deshacer.')) {
                // Acceder a las variables globales del script original
                if (typeof grupos !== 'undefined' && typeof dataGrupos !== 'undefined' && typeof normalizarSeedGrupo !== 'undefined' && typeof claveGrupo !== 'undefined') {
                    grupos.forEach(grupo => {
                        dataGrupos[grupo] = normalizarSeedGrupo(grupo);
                        localStorage.removeItem(claveGrupo(grupo));
                    });
                    // Forzar actualización de la vista
                    if (typeof renderContenidoPrincipal === 'function') {
                        renderContenidoPrincipal();
                    } else if (typeof renderContenido === 'function') {
                        renderContenido();
                    }
                    const estadoDiv = document.getElementById('estadoGuardado');
                    if (estadoDiv) {
                        estadoDiv.textContent = '✅ Todos los grupos han sido limpiados exitosamente.';
                        setTimeout(() => estadoDiv.textContent = '', 4000);
                    }
                } else {
                    console.error('No se encontraron las funciones necesarias para limpiar grupos');
                    alert('Error: No se pudo limpiar los grupos. Revisa la consola.');
                }
            }
        });
        
        // --- Función para cargar resultados oficiales de todos los grupos ---
        btnCargarTodos.addEventListener('click', async function() {
            const estadoDiv = document.getElementById('estadoGuardado');
            if (estadoDiv) estadoDiv.textContent = '🔄 Cargando resultados oficiales para TODOS los grupos...';
            
            if (typeof cargarResultadosOficialesGrupo !== 'function') {
                if (estadoDiv) estadoDiv.textContent = '❌ Error: No se encuentra la función cargarResultadosOficialesGrupo';
                return;
            }
            
            try {
                let totalActualizados = 0;
                for (const grupo of grupos) {
                    const { actualizados } = await cargarResultadosOficialesGrupo(grupo);
                    totalActualizados += actualizados;
                }
                if (estadoDiv) {
                    estadoDiv.textContent = `✅ Carga completa. Se actualizaron ${totalActualizados} partidos con resultados oficiales.`;
                    setTimeout(() => estadoDiv.textContent = '', 5000);
                }
                if (typeof renderContenidoPrincipal === 'function') {
                    renderContenidoPrincipal();
                } else if (typeof renderContenido === 'function') {
                    renderContenido();
                }
            } catch (error) {
                if (estadoDiv) estadoDiv.textContent = `❌ Error al cargar resultados oficiales: ${error.message || error}`;
            }
        });
    }
    
    // Ejecutar cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', agregarBotonesGlobales);
    } else {
        agregarBotonesGlobales();
    }
})();
</script>
