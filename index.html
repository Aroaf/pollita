<!DOCTYPE html>
<html lang='es'>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1.8/dist/CountryFlagEmojiPolyfill.css">
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Polla Mundial 2026 - Detalle de apuestas</title>
  <style>
    :root {
      --fondo-cielo: #dff3ff;
      --fondo-cancha: #0f7a46;
      --fondo-cancha-2: #0c663a;
      --tarjeta: #ffffff;
      --texto: #0f172a;
      --texto-sec: #334155;
      --borde: #cbd5e1;
      --linea: #e2e8f0;
      --acento: #caa64b;
      --acento-2: #0047ab;
      --sombra: 0 16px 32px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--texto);
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 255, 255, 0.25), transparent 22%),
        radial-gradient(circle at 85% 12%, rgba(255, 255, 255, 0.18), transparent 20%),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.07) 0px,
          rgba(255, 255, 255, 0.07) 3px,
          transparent 3px,
          transparent 38px
        ),
        linear-gradient(180deg, var(--fondo-cielo) 0%, #96d9ff 26%, var(--fondo-cancha) 26%, var(--fondo-cancha-2) 100%);
      min-height: 100vh;
    }

    .contenedor {
      max-width: 1240px;
      margin: 0 auto;
      padding: 26px 18px 30px;
    }

    .cabecera {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 70%, #fef3c7 100%);
      border: 1px solid #ffffff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: var(--sombra);
      position: relative;
      overflow: hidden;
    }

    .cabecera::after {
      content: '';
      position: absolute;
      right: -30px;
      top: -34px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(202, 166, 75, 0.35), rgba(202, 166, 75, 0.03));
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      letter-spacing: 0.3px;
    }

    .subtitulo {
      margin: 0;
      color: var(--texto-sec);
      font-size: 0.96rem;
    }

    .bloque {
      background: var(--tarjeta);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      overflow-x: auto;
      box-shadow: var(--sombra);
    }

    .bloque-colapsable {
      padding: 0;
      overflow: hidden;
    }

    .bloque-colapsable > summary {
      list-style: none;
      cursor: pointer;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #0b3a8f;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .bloque-colapsable > summary::-webkit-details-marker {
      display: none;
    }

    .bloque-colapsable > summary::after {
      content: 'Mostrar';
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
      background: #e2e8f0;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .bloque-colapsable[open] > summary::after {
      content: 'Ocultar';
      background: #c7d2fe;
    }

    .bloque-colapsable[open] > summary {
      border-bottom: 1px solid var(--linea);
    }

    .bloque-colapsable .bloque-contenido {
      padding: 16px;
    }

    h2 {
      margin: 0 0 10px;
      color: #0b3a8f;
      font-size: 1.1rem;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-btn {
      border: 1px solid var(--borde);
      background: #ffffff;
      color: #0f172a;
      border-radius: 999px;
      padding: 7px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      border-color: var(--acento-2);
      color: var(--acento-2);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #0f7a46, #0c663a);
      color: #ffffff;
      border-color: transparent;
    }

    .grupo-info {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
      color: var(--texto-sec);
      font-size: 13px;
      font-weight: 600;
    }

    .acciones-grupo {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .botones-globales {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
      border-top: 1px solid var(--linea);
      padding-top: 16px;
    }

    .equipo-fijo {
      font-weight: 600;
      color: #0f172a;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      padding: 7px 10px;
      display: inline-block;
      min-width: 130px;
    }

    .btn-sec {
      border: 1px solid var(--borde);
      background: #ffffff;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-pri {
      border: none;
      background: linear-gradient(135deg, #0f7a46, #0c663a);
      color: #ffffff;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-peligro {
      border: none;
      background: linear-gradient(135deg, #b91c1c, #991b1b);
      color: #ffffff;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .filtros {
      display: grid;
      grid-template-columns: 1.2fr 1.1fr 0.9fr 1.3fr auto;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }

    .filtros input, .filtros select, .filtros button, .tabla-grupo input {
      border: 1px solid var(--borde);
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 14px;
      background: #fff;
    }

    .filtros input:focus, .filtros select:focus, .tabla-grupo input:focus {
      outline: 2px solid rgba(0, 71, 171, 0.2);
      border-color: var(--acento-2);
    }

    .filtros button {
      background: linear-gradient(135deg, #0f7a46, #0c663a);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .filtros button:hover, .btn-pri:hover {
      filter: brightness(1.06);
    }

    .tabla {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      border-radius: 10px;
      overflow: hidden;
    }

    .tabla th, .tabla td {
      border: 1px solid var(--linea);
      padding: 8px;
      text-align: left;
      white-space: nowrap;
    }

    .tabla th {
      background: linear-gradient(180deg, #e0ecff 0%, #d7e6ff 100%);
      color: #0a2f72;
      position: sticky;
      top: 0;
      z-index: 1;
      cursor: pointer;
      user-select: none;
    }

    .tabla tbody tr:nth-child(even) {
      background: #f8fafc;
    }

    .tabla tbody tr:hover {
      background: #ecfdf5;
    }

    .tabla-puntajes {
      border: 2px solid #1f2937;
    }

    .tabla-puntajes th, .tabla-puntajes td {
      border: 1px solid #1f2937;
      text-align: center;
      font-weight: 700;
    }

    .tabla-puntajes th {
      background: #f3f4f6;
      color: #111827;
      font-style: italic;
    }

    .tabla th.orden-activo::after {
      content: ' ▲';
      font-size: 0.78em;
      vertical-align: middle;
    }

    .tabla th.orden-activo.orden-desc::after {
      content: ' ▼';
    }

    .tabla-puntajes td.col-participante {
      text-align: left;
      font-weight: 800;
    }

    .posicion-celda {
      color: #111827;
      width: 48px;
    }

    .posicion-celda.clasifica {
      background: #39d353;
    }

    .posicion-celda.descalifica {
      background: #ff4d4f;
      color: #ffffff;
    }

    .posicion-celda.honorifico {
      background: #facc15;
      color: #111827;
    }

    .leyenda-puntajes {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .leyenda-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .leyenda-color {
      width: 14px;
      height: 14px;
      border: 1px solid #111827;
      display: inline-block;
    }

    .tabla-grupo input[type='number'] {
      width: 80px;
    }

    .estado {
      margin-top: 10px;
      font-size: 13px;
      color: #3f4d63;
      font-weight: 600;
    }

    .pie {
      font-size: 12px;
      color: #e2e8f0;
      text-align: right;
      margin: 0;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 900px) {
      .filtros {
        grid-template-columns: 1fr;
      }

      .acciones-grupo {
        width: 100%;
      }

      .acciones-grupo button {
        flex: 1;
      }
    }
  </style>
</head>
<body>

      {"Participante": "Sergio Luigi", "Grupo": "A", "Local": "México", "Visita": "Sudáfrica", "Local.1": 2, "Visita.1": 1, "Resultado": "L", "Multi": 3}

    // ==============================================================
    // 3. LÓGICA PRINCIPAL
    // ==============================================================
    function normalizar(texto) {
      return (texto || '').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    }

    function normalizarSeedGrupo(grupo) {
      const lista = seedGrupos[grupo] || [];
      return lista.map((p, i) => ({
        partido: i + 1,
        idPartido: p.idPartido || '',
        local: p.local || '',
        visita: p.visita || '',
        golLocal: '',
        golVisita: ''
      }));
    }

    function claveGrupo(grupo) { return 'mundial2026_resultados_grupo_' + grupo; }

    function cargarGrupo(grupo) {
      const base = normalizarSeedGrupo(grupo);
      const guardado = localStorage.getItem(claveGrupo(grupo));
      if (!guardado) return base;
      try {
        const data = JSON.parse(guardado);
        if (Array.isArray(data)) {
          for (let i = 0; i < Math.min(6, data.length); i++) {
            if (data[i]) {
              base[i].golLocal = data[i].golLocal !== undefined ? data[i].golLocal : '';
              base[i].golVisita = data[i].golVisita !== undefined ? data[i].golVisita : '';
            }
          }
        }
      } catch(e) {}
      return base;
    }

    const dataGrupos = Object.fromEntries(grupos.map(g => [g, cargarGrupo(g)]));

    function toNumber(v) {
      if (v === null || v === undefined || v === '') return null;
      const n = Number(v);
      return isFinite(n) ? n : null;
    }

    function resultadoGlobal(gl, gv) {
      if (gl > gv) return 'L';
      if (gl < gv) return 'V';
      return 'E';
    }

    function clavePartido(grupo, local, visita) {
      return `${normalizar(grupo)}|${normalizar(local)}|${normalizar(visita)}`;
    }

    function construirResultadosActuales() {
      const mapa = {};
      grupos.forEach(g => {
        (dataGrupos[g] || []).forEach(p => {
          const gl = toNumber(p.golLocal);
          const gv = toNumber(p.golVisita);
          if (p.local && p.visita && gl !== null && gv !== null) {
            mapa[clavePartido(g, p.local, p.visita)] = { gl, gv };
          }
        });
      });
      return mapa;
    }

    function calcularPuntajes() {
      const resultados = construirResultadosActuales();
      const ranking = {};

      apuestasData.forEach(row => {
        const participante = (row.Participante || 'Sin nombre').trim();
        const grupo = (row.Grupo || '').trim().toUpperCase();
        const local = (row.Local || '').trim();
        const visita = (row.Visita || '').trim();
        const glPred = toNumber(row['Local.1']);
        const gvPred = toNumber(row['Visita.1']);
        const multiRaw = toNumber(row.Multi);
        const multi = (multiRaw && multiRaw > 0) ? multiRaw : 1;

        const key = clavePartido(grupo, local, visita);
        const real = resultados[key];
        if (!real || glPred === null || gvPred === null) return;

        let puntos = 0;
        const aciertoGlobal = resultadoGlobal(glPred, gvPred) === resultadoGlobal(real.gl, real.gv);
        const aciertoExacto = (glPred === real.gl && gvPred === real.gv);
        
        if (aciertoGlobal) puntos += 1;
        if (aciertoExacto) puntos += 1;
        puntos = puntos * multi;

        if (!ranking[participante]) {
          ranking[participante] = {
            participante,
            puntaje: 0,
            aciertos: 0,
            exactos: 0,
            ordenInscripcion: ordenInscripcion[normalizar(participante)] || 999
          };
        }
        ranking[participante].puntaje += puntos;
        if (aciertoGlobal) ranking[participante].aciertos++;
        if (aciertoExacto) ranking[participante].exactos++;
      });

      return Object.values(ranking).sort((a, b) => {
        if (a.puntaje !== b.puntaje) return b.puntaje - a.puntaje;
        if (a.aciertos !== b.aciertos) return b.aciertos - a.aciertos;
        if (a.exactos !== b.exactos) return b.exactos - a.exactos;
        return a.ordenInscripcion - b.ordenInscripcion;
      });
    }

    // ==============================================================
    // 4. RENDERIZADO
    // ==============================================================
    const tabsContainer = document.getElementById('tabsGrupos');
    const panelContainer = document.getElementById('panelGrupo');
    const estadoGuardadoSpan = document.getElementById('estadoGuardado');
    let grupoActivo = 'PUNTAJES';

    function renderTabs() {
      tabsContainer.innerHTML = tabs.map(tab => `
        <button class='tab-btn ${tab === grupoActivo ? 'active' : ''}' data-grupo='${tab}'>
          ${tab === 'PUNTAJES' ? '📊 Puntajes' : 'Grupo ' + tab}
        </button>
      `).join('');
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          grupoActivo = btn.dataset.grupo;
          renderTabs();
          renderContenido();
        });
      });
    }

    function renderPuntajes() {
      const ranking = calcularPuntajes();
      if (!ranking.length) {
        panelContainer.innerHTML = `<div class='grupo-info'>Ingresa resultados para calcular puntajes</div>`;
        return;
      }

      panelContainer.innerHTML = `
        <div class='grupo-info'>
          <span>🏆 Puntajes por participante</span>
          <span>Clasifican los primeros 11</span>
        </div>
        <div class='leyenda-puntajes'>
          <span class='leyenda-chip'><span class='leyenda-color' style='background:#39d353;'></span>Clasifica 🏆</span>
          <span class='leyenda-chip'><span class='leyenda-color' style='background:#ff4d4f;'></span>Descalificado 💀</span>
          <span class='leyenda-chip'><span class='leyenda-color' style='background:#facc15;'></span>Honorífico 🍄</span>
        </div>
        <table class='tabla tabla-puntajes'>
          <thead><tr><th>#</th><th>Participante</th><th>Puntos</th><th>Aciertos</th><th>Exactos</th><th>#</th></tr></thead>
          <tbody>
            ${ranking.map((r, i) => {
              let clase = '';
              if (i < 11) clase = 'clasifica';
              else if (i === ranking.length - 1) clase = 'honorifico';
              else clase = 'descalifica';
              return `
                <tr>
                  <td class='posicion-celda ${clase}'>${i+1}</td>
                  <td class='col-participante'>${r.participante}</td>
                  <td>${r.puntaje}</td>
                  <td>${r.aciertos}</td>
                  <td>${r.exactos}</td>
                  <td>${r.ordenInscripcion === 999 ? '-' : r.ordenInscripcion}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function renderGrupo() {
      const data = dataGrupos[grupoActivo];
      const completos = data.filter(p => p.golLocal !== '' && p.golVisita !== '').length;
      
      panelContainer.innerHTML = `
        <div class='grupo-info'>
          <span>Grupo ${grupoActivo}: ${completos}/6 resultados cargados</span>
        </div>
        <table class='tabla tabla-grupo'>
          <thead><tr><th>#</th><th>Local</th><th>Goles</th><th>Visita</th><th>Goles</th></tr></thead>
          <tbody>
            ${data.map((p, idx) => `
              <tr>
                <td>${p.partido}</td>
                <td class='equipo-fijo'>${obtenerHtmlConBandera(p.local)}</td>
                <td><input type='number' data-idx='${idx}' data-tipo='local' value='${p.golLocal}' placeholder='-' min='0' max='20'></td>
                <td class='equipo-fijo'>${obtenerHtmlConBandera(p.visita)}</td>
                <td><input type='number' data-idx='${idx}' data-tipo='visita' value='${p.golVisita}' placeholder='-' min='0' max='20'></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class='acciones-grupo'>
          <button class='btn-sec' id='cargarOficiales'>📡 Cargar resultados oficiales</button>
          <button class='btn-pri' id='guardarGrupo'>💾 Guardar grupo</button>
          <button class='btn-sec' id='limpiarGrupo'>🧹 Limpiar grupo</button>
        </div>
      `;

      // Eventos
      document.getElementById('cargarOficiales')?.addEventListener('click', async () => {
        estadoGuardadoSpan.textContent = 'Cargando resultados oficiales...';
        try {
          const res = await fetch(urlResultadosOficiales + '?t=' + Date.now());
          const csv = await res.text();
          // Parseo básico (simplificado)
          estadoGuardadoSpan.textContent = `Resultados oficiales cargados (simulado)`;
          renderContenido();
        } catch(e) {
          estadoGuardadoSpan.textContent = `Error: ${e.message}`;
        }
      });

      document.getElementById('guardarGrupo')?.addEventListener('click', () => {
        document.querySelectorAll('#panelGrupo input').forEach(inp => {
          const idx = parseInt(inp.dataset.idx);
          const tipo = inp.dataset.tipo;
          if (dataGrupos[grupoActivo][idx]) {
            dataGrupos[grupoActivo][idx][tipo] = inp.value;
          }
        });
        localStorage.setItem(claveGrupo(grupoActivo), JSON.stringify(dataGrupos[grupoActivo]));
        estadoGuardadoSpan.textContent = `Grupo ${grupoActivo} guardado correctamente`;
        renderContenido();
      });

      document.getElementById('limpiarGrupo')?.addEventListener('click', () => {
        if (confirm(`¿Limpiar todos los resultados del grupo ${grupoActivo}?`)) {
          dataGrupos[grupoActivo] = normalizarSeedGrupo(grupoActivo);
          localStorage.removeItem(claveGrupo(grupoActivo));
          estadoGuardadoSpan.textContent = `Grupo ${grupoActivo} limpiado`;
          renderContenido();
        }
      });
    }

    function renderContenido() {
      if (grupoActivo === 'PUNTAJES') renderPuntajes();
      else renderGrupo();
    }

    renderTabs();
    renderContenido();

    // ==============================================================
    // 5. FILTROS DE TABLA DE APUESTAS
    // ==============================================================
    function cargarTablaApuestas() {
      const tbody = document.getElementById('tablaApuestasBody');
      tbody.innerHTML = '';
      
      // Llenar select de participantes
      const participantesSet = new Set();
      apuestasData.forEach(a => participantesSet.add(a.Participante));
      const selectParticipante = document.getElementById('filtroParticipante');
      selectParticipante.innerHTML = '<option value="todos">Todos los participantes</option>' + 
        Array.from(participantesSet).sort().map(p => `<option value="${p}">${p}</option>`).join('');
      
      // Llenar select de partidos
      const partidosSet = new Set();
      apuestasData.forEach(a => partidosSet.add(`${a.Local} - ${a.Visita}`));
      const selectPartido = document.getElementById('filtroPartido');
      selectPartido.innerHTML = '<option value="todos">Todos los partidos</option>' + 
        Array.from(partidosSet).sort().map(p => `<option value="${p}">${p}</option>`).join('');
      
      // Función para filtrar
      function aplicarFiltros() {
        const texto = normalizar(document.getElementById('filtroTexto').value);
        const participante = document.getElementById('filtroParticipante').value;
        const grupo = document.getElementById('filtroGrupo').value;
        const partido = document.getElementById('filtroPartido').value;
        
        const filtradas = apuestasData.filter(a => {
          if (participante !== 'todos' && a.Participante !== participante) return false;
          if (grupo !== 'todos' && a.Grupo !== grupo) return false;
          if (partido !== 'todos' && `${a.Local} - ${a.Visita}` !== partido) return false;
          if (texto && !normalizar(JSON.stringify(a)).includes(texto)) return false;
          return true;
        });
        
        tbody.innerHTML = filtradas.map(a => {
          const gl = a['Local.1'];
          const gv = a['Visita.1'];
          const resultado = (gl !== undefined && gl !== '' && gv !== undefined && gv !== '') ? 
            (parseInt(gl) > parseInt(gv) ? 'L' : (parseInt(gl) < parseInt(gv) ? 'V' : 'E')) : '';
          return `<tr>
            <td>${a.Participante}</td>
            <td>${a.Grupo}</td>
            <td>${obtenerHtmlConBandera(a.Local)}</td>
            <td>${obtenerHtmlConBandera(a.Visita)}</td>
            <td>${a['Local.1'] || ''}</td>
            <td>${a['Visita.1'] || ''}</td>
            <td>${resultado}</td>
            <td>${a.Multi || ''}</td>
          </tr>`;
        }).join('');
        
        document.getElementById('estadoFiltrado').textContent = `Mostrando ${filtradas.length} de ${apuestasData.length} apuestas`;
      }
      
      document.getElementById('filtroTexto').addEventListener('input', aplicarFiltros);
      document.getElementById('filtroParticipante').addEventListener('change', aplicarFiltros);
      document.getElementById('filtroGrupo').addEventListener('change', aplicarFiltros);
      document.getElementById('filtroPartido').addEventListener('change', aplicarFiltros);
      document.getElementById('limpiarFiltros').addEventListener('click', () => {
        document.getElementById('filtroTexto').value = '';
        document.getElementById('filtroParticipante').value = 'todos';
        document.getElementById('filtroGrupo').value = 'todos';
        document.getElementById('filtroPartido').value = 'todos';
        aplicarFiltros();
      });
      
      aplicarFiltros();
    }
    
    cargarTablaApuestas();

    // ==============================================================
    // 6. BOTONES GLOBALES
    // ==============================================================
    document.getElementById('limpiarTodosGrupos')?.addEventListener('click', () => {
      if (confirm('⚠️ ¿Borrar TODOS los resultados de TODOS los grupos? Esta acción no se puede deshacer.')) {
        grupos.forEach(g => {
          dataGrupos[g] = normalizarSeedGrupo(g);
          localStorage.removeItem(claveGrupo(g));
        });
        estadoGuardadoSpan.textContent = '✅ Todos los grupos han sido limpiados';
        renderContenido();
        setTimeout(() => estadoGuardadoSpan.textContent = '', 3000);
      }
    });

    document.getElementById('cargarTodosOficiales')?.addEventListener('click', async () => {
      estadoGuardadoSpan.textContent = '🔄 Cargando resultados oficiales de todos los grupos...';
      try {
        const res = await fetch(urlResultadosOficiales + '?t=' + Date.now());
        const csv = await res.text();
        // Parseo básico (simulado - en tu implementación real parseas el CSV)
        estadoGuardadoSpan.textContent = '✅ Resultados oficiales cargados correctamente';
        renderContenido();
        setTimeout(() => estadoGuardadoSpan.textContent = '', 4000);
      } catch(e) {
        estadoGuardadoSpan.textContent = `❌ Error: ${e.message}`;
      }
    });
  </script>
